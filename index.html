<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:380px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);
color:white;
animation:pop 1s ease;
}

@keyframes pop{
0%{
transform:scale(.5);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

h1{
font-size:2rem;
margin-bottom:15px;
}

h2{
font-size:1.4rem;
margin-bottom:15px;
}

p{
font-size:16px;
line-height:1.6;
margin-bottom:25px;
}

button{
padding:14px 28px;
border:none;
border-radius:40px;
background:white;
color:#ff4081;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.balloon{
position:absolute;
bottom:-120px;
width:50px;
height:65px;
border-radius:50%;
animation:float 8s linear infinite;
}

.balloon::after{
content:"";
position:absolute;
left:50%;
top:65px;
width:2px;
height:70px;
background:white;
}

.red{background:#ff4d4d;left:10%;animation-duration:8s;}
.blue{background:#4da6ff;left:30%;animation-duration:10s;}
.yellow{background:#ffd633;left:50%;animation-duration:9s;}
.green{background:#66ff66;left:70%;animation-duration:11s;}
.pink{background:#ff66cc;left:90%;animation-duration:7s;}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

footer{
margin-top:20px;
font-size:14px;
opacity:.9;
}

@media(max-width:480px){

h1{
font-size:1.8rem;
}

h2{
font-size:1.2rem;
}

p{
font-size:15px;
}

button{
width:100%;
}

}
</style>
</head>

<body>

<div class="balloon red"></div>
<div class="balloon blue"></div>
<div class="balloon yellow"></div>
<div class="balloon green"></div>
<div class="balloon pink"></div>

<div class="card">

<h1>🎂 Happy Birthday 🎂</h1>

<h2>Dear Friend ❤️</h2>

<p>
May your birthday be filled with endless happiness,
beautiful memories, love, laughter, and all the success
you deserve. Wishing you the most amazing year ahead! 🎉🥳
</p>

<button onclick="celebrate()">
🎁 Celebrate
</button>

<footer>
Made with ❤️ Just for You
</footer>

</div>

<script>

function celebrate(){

var duration=5000;
var animationEnd=Date.now()+duration;

var defaults={
startVelocity:30,
spread:360,
ticks:60,
zIndex:999
};

function randomInRange(min,max){
return Math.random()*(max-min)+min;
}

var interval=setInterval(function(){

var timeLeft=animationEnd-Date.now();

if(timeLeft<=0){
return clearInterval(interval);
}

var particleCount=50*(timeLeft/duration);

confetti(Object.assign({},defaults,{
particleCount,
origin:{
x:randomInRange(0.1,0.3),
y:Math.random()-0.2
}
}));

confetti(Object.assign({},defaults,{
particleCount,
origin:{
x:randomInRange(0.7,0.9),
y:Math.random()-0.2
}
}));

},250);

}

// Auto Confetti
setTimeout(celebrate,700);

</script>

</body>
</html>
